name: CI

on:
  push:
  pull_request:

jobs:
  check-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Type check
        run: npm run check
      - name: Build
        run: npm run build
